<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNPT / OSCP Study Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Rajdhani:wght@500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --bg2: #0d0d1a;
    --bg3: #111120;
    --border: #1a1a2e;
    --border2: #22223a;
    --text: #c8d0e0;
    --text-dim: #555;
    --text-dimmer: #2a2a3a;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --display: 'Rajdhani', sans-serif;
    --sidebar: 240px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    display: flex;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar);
    min-width: var(--sidebar);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: #1e1e30; border-radius: 2px; }

  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-title-sm {
    font-family: var(--display);
    font-size: 10px;
    letter-spacing: 4px;
    color: #00e5ff;
    margin-bottom: 3px;
  }

  .sidebar-title-lg {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .sidebar-sub {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  #search-wrap {
    padding: 12px 12px 8px;
    flex-shrink: 0;
    position: relative;
  }

  #search {
    width: 100%;
    background: #0a0a16;
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 8px 28px 8px 10px;
    color: #00e5ff;
    font-size: 11px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: #00e5ff44; }
  #search::placeholder { color: #333; }

  #search-clear {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 14px;
    display: none;
    padding: 2px 4px;
  }

  #search-clear:hover { color: #888; }

  #nav { flex: 1; padding-bottom: 16px; }

  .group-label {
    font-size: 8px;
    letter-spacing: 2.5px;
    padding: 12px 16px 5px;
    opacity: 0.5;
    font-family: var(--display);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 8px 16px;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    color: #555;
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
    text-align: left;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
  }

  .nav-btn:hover { color: #888; background: #ffffff05; }

  .nav-btn.active {
    border-left-color: var(--section-color, #00e5ff);
    background: color-mix(in srgb, var(--section-color, #00e5ff) 8%, transparent);
    color: var(--section-color, #00e5ff);
  }

  .nav-btn .icon { font-size: 13px; flex-shrink: 0; }
  .nav-btn .label { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }

  /* ── MAIN CONTENT ── */
  #main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 24px 28px;
    background: var(--bg);
  }

  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: #1a1a28; border-radius: 3px; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon { font-size: 30px; line-height: 1; }

  .section-title {
    font-family: var(--display);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1;
  }

  .section-meta {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ── WARNING BANNER ── */
  .warning-banner {
    background: #ff17440d;
    border: 1px solid #ff174430;
    border-radius: 4px;
    padding: 9px 14px;
    margin-bottom: 16px;
    color: #ff6b6b;
    font-size: 11px;
    line-height: 1.5;
  }

  /* ── SEARCH RESULTS ── */
  #search-header {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  #search-header span { color: #00e5ff; }

  /* ── SUBSECTION ACCORDION ── */
  .subsection {
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .subsection.open { border-color: var(--sub-color, #444); }

  .sub-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 15px;
    cursor: pointer;
    background: var(--bg2);
    user-select: none;
    transition: background 0.15s;
  }

  .sub-header:hover { background: var(--bg3); }
  .subsection.open .sub-header { background: var(--bg3); }

  .sub-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: color 0.15s;
  }

  .sub-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .sub-count {
    font-size: 9px;
    color: #444;
    background: #111120;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 1px;
  }

  .sub-arrow {
    color: #333;
    font-size: 10px;
    transition: transform 0.2s;
  }

  .subsection.open .sub-arrow { transform: rotate(90deg); }

  .sub-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .subsection.open .sub-body { display: block; }

  /* ── OVERVIEW TEXT ── */
  .overview-text {
    background: #05050e;
    border: 1px solid #111;
    border-radius: 3px;
    padding: 10px 14px;
    margin: 12px 14px;
    color: #777;
    font-size: 11px;
    line-height: 1.7;
  }

  /* ── COMMAND CARD ── */
  .cmd-card {
    border-bottom: 1px solid #0d0d18;
    transition: background 0.1s;
  }

  .cmd-card:last-child { border-bottom: none; }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
  }

  .cmd-top:hover { background: #ffffff03; }

  .tag-pill {
    font-size: 8px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1.5px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
    border: 1px solid;
  }

  .cmd-main { flex: 1; min-width: 0; }

  .cmd-text {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.5;
    word-break: break-all;
    white-space: pre-wrap;
    letter-spacing: 0.2px;
  }

  .cmd-desc {
    font-size: 10px;
    color: #555;
    margin-top: 3px;
    line-height: 1.4;
  }

  .cmd-section-label { color: #333; margin-left: 8px; }

  .cmd-chevron {
    color: #333;
    font-size: 10px;
    margin-top: 2px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .cmd-card.expanded .cmd-chevron { transform: rotate(90deg); }

  .cmd-detail {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid #111;
  }

  .cmd-card.expanded .cmd-detail { display: block; }

  .cmd-note {
    background: #05050e;
    border: 1px solid #111;
    border-radius: 3px;
    padding: 8px 12px;
    margin-top: 10px;
    margin-bottom: 10px;
    color: #888;
    font-size: 11px;
    line-height: 1.7;
  }

  .cmd-note-label { margin-right: 8px; opacity: 0.6; }

  .cmd-copy-wrap {
    border: 1px solid #1a1a28;
    border-radius: 3px;
    padding: 8px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 10px;
    background: #03030a;
  }

  .cmd-copy-code {
    flex: 1;
    color: #00e5ff;
    font-size: 11px;
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.6;
    font-family: var(--mono);
  }

  .copy-btn {
    background: transparent;
    border: 1px solid #333;
    color: #555;
    padding: 3px 8px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 10px;
    font-family: var(--mono);
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: #555; color: #888; }
  .copy-btn.copied { color: #69ff47; border-color: #69ff47; background: #69ff4710; }

  /* ── ITEMS (tag + label + detail) ── */
  .item-row {
    display: flex;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid #0d0d18;
    align-items: flex-start;
  }

  .item-row:last-child { border-bottom: none; }

  .item-content { flex: 1; min-width: 0; }

  .item-label {
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
  }

  .item-detail {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
    line-height: 1.5;
  }

  /* ── TIP BOX ── */
  .tip-box {
    margin: 10px 14px 14px;
    padding: 8px 12px;
    border-radius: 3px;
    font-size: 11px;
    line-height: 1.6;
    border: 1px solid;
  }

  /* ── CHEATSHEET TABLE ── */
  .cheatsheet-wrap {
    overflow-x: auto;
    padding: 12px 14px;
  }

  .cheatsheet-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .cheatsheet-table th {
    text-align: left;
    padding: 5px 8px;
    letter-spacing: 1px;
    border-bottom: 1px solid;
    font-family: var(--display);
    font-size: 10px;
  }

  .cheatsheet-table td {
    padding: 6px 8px;
    border-bottom: 1px solid #0d0d10;
    vertical-align: top;
  }

  .cheatsheet-table tr:last-child td { border-bottom: none; }

  .cs-num { color: #333; font-size: 10px; }
  .cs-phase { white-space: nowrap; font-weight: 600; font-size: 10px; }
  .cs-action { color: #aaa; word-break: break-word; }

  /* ── SEARCH SECTION LABEL ── */
  .search-section-title {
    font-family: var(--display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 0 6px;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── FOOTER ── */
  #footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: #1e1e28;
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  /* ── SCROLLBAR MAIN ── */
  #main::-webkit-scrollbar { width: 5px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    :root { --sidebar: 200px; }
    #main { padding: 16px; }
  }

  @media (max-width: 500px) {
    #sidebar { display: none; }
    body { flex-direction: column; }
    #main { padding: 12px; }
  }

  /* scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title-sm">ETHICAL HACKING</div>
    <div class="sidebar-title-lg">PNPT / OSCP<br>STUDY NOTES</div>
    <div class="sidebar-sub">open book reference</div>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="$_ search commands, tags...">
    <button id="search-clear" onclick="clearSearch()">×</button>
  </div>
  <nav id="nav"></nav>
  <div id="footer">PNPT / OSCP · TCM SECURITY</div>
</div>

<div id="main">
  <div id="content"></div>
</div>

<script>
const sections = [
  // ── SSH ────────────────────────────────────────────────────────

          { cmd: "nmap -A -p 22 192.168.31.205", desc: "Aggressive scan — OS detection, scripts, version", tag: "ENUM" },

      {

          { label: "id_rsa.pub (public key)", detail: "~/.ssh/id_rsa.pub — safe to share, placed on servers to allow access", tag: "INFO" },

  // ── INITIAL ACCESS PROTOCOLS ──────────────────────────────────

      {

const groups = [
  { label: "INITIAL ACCESS", color: "#ffd740", ids: ["ssh", "initaccess"] },
  { label: "RECONNAISSANCE", color: "#00e5ff", ids: ["osint", "network", "portref"] },

// ── STATE ──────────────────────────────────────────────────────
let activeId = 'ssh';
let expandedSubs = {};
let expandedCmds = {};

// ── BUILD NAVIGATION ──────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  groups.forEach(g => {
    const label = document.createElement('div');
    label.className = 'group-label';
    label.style.color = g.color;
    label.textContent = g.label;
    nav.appendChild(label);

    g.ids.forEach(id => {
      const sec = sections.find(s => s.id === id);
      if (!sec) return;
      const btn = document.createElement('button');
      btn.className = 'nav-btn' + (id === activeId ? ' active' : '');
      btn.style.setProperty('--section-color', sec.color);
      btn.dataset.id = id;
      btn.innerHTML = `<span class="icon">${sec.icon}</span><span class="label">${sec.title}</span>`;
      btn.onclick = () => activateSection(id);
      nav.appendChild(btn);
    });
  });
}

// ── ACTIVATE SECTION ─────────────────────────────────────────
function activateSection(id) {
  activeId = id;
  expandedSubs = {};
  expandedCmds = {};
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  buildNav();
  renderSection();
  document.getElementById('main').scrollTop = 0;
}

// ── RENDER SECTION ────────────────────────────────────────────
function renderSection() {
  const sec = sections.find(s => s.id === activeId);
  if (!sec) return;
  const el = document.getElementById('content');

  const cmdCount = sec.type === 'notes'
    ? sec.subsections.reduce((a, s) => a + (s.commands || []).length + (s.items || []).length, 0)
    : 0;

  let html = `
    <div class="section-header">
      <span class="section-icon">${sec.icon}</span>
      <div>
        <div class="section-title" style="color:${sec.color}">${sec.title}</div>
        <div class="section-meta">${sec.subsections ? sec.subsections.length + ' topics' : ''} · ${cmdCount} entries</div>
      </div>
    </div>`;

  if (sec.warning) {
    html += `<div class="warning-banner">⚠️ ${esc(sec.warning)}</div>`;
  }

  if (sec.type === 'notes') {
    sec.subsections.forEach((sub, si) => {
      html += renderSubsection(sub, si, sec.color, sec.id);
    });
  }

  el.innerHTML = html;
  attachSubListeners(sec);
}

// ── RENDER SUBSECTION ─────────────────────────────────────────
function renderSubsection(sub, si, color, secId) {
  const key = `${secId}-${si}`;
  const isOpen = !!expandedSubs[key];
  const count = (sub.commands || []).length + (sub.items || []).length + (sub.rows || []).length;

  let body = '';

  if (sub.content) {
    body += `<div class="overview-text">${esc(sub.content)}</div>`;
  }

  if (sub.isCheatsheet && sub.rows) {
    body += `<div class="cheatsheet-wrap"><table class="cheatsheet-table">
      <thead><tr>
        <th style="color:${color};border-color:${color}44">#</th>
        <th style="color:${color};border-color:${color}44">Phase</th>
        <th style="color:${color};border-color:${color}44">Command / Action</th>
      </tr></thead><tbody>`;
    sub.rows.forEach(row => {
      body += `<tr>
        <td class="cs-num">${esc(row.num)}</td>
        <td class="cs-phase" style="color:${color}">${esc(row.phase)}</td>
        <td class="cs-action">${esc(row.action)}</td>
      </tr>`;
    });
    body += `</tbody></table></div>`;
  }

  if (sub.items) {
    sub.items.forEach(item => {
      const tc = tagColors[item.tag] || '#555';
      body += `<div class="item-row">
        <span class="tag-pill" style="color:${tc};border-color:${tc}44;background:${tc}14">${esc(item.tag)}</span>
        <div class="item-content">
          <div class="item-label" style="color:${color}">${esc(item.label)}</div>
          <div class="item-detail">${esc(item.detail)}</div>
        </div>
      </div>`;
    });
  }

  if (sub.commands) {
    sub.commands.forEach((c, ci) => {
      body += renderCmdCard(c, ci, si, color, secId);
    });
  }

  if (sub.tip) {
    body += `<div class="tip-box" style="color:${color}cc;border-color:${color}22;background:${color}0a">💡 ${esc(sub.tip)}</div>`;
  }

  return `<div class="subsection${isOpen ? ' open' : ''}" data-si="${si}" style="--sub-color:${color}">
    <div class="sub-header">
      <span class="sub-title" style="color:${isOpen ? color : '#777'}">${esc(sub.title)}</span>
      <div class="sub-right">
        <span class="sub-count">${count}</span>
        <span class="sub-arrow">▶</span>
      </div>
    </div>
    <div class="sub-body">${body}</div>
  </div>`;
}

// ── RENDER CMD CARD ───────────────────────────────────────────
function renderCmdCard(c, ci, si, color, secId, sectionLabel) {
  const cmdKey = `${secId}-${si}-${ci}`;
  const isExpanded = !!expandedCmds[cmdKey];
  const tc = tagColors[c.tag] || color;

  let detail = '';
  if (c.detail) {
    detail += `<div class="cmd-note"><span class="cmd-note-label" style="color:${color}88">NOTE:</span>${esc(c.detail)}</div>`;
  }
  detail += `<div class="cmd-copy-wrap">
    <pre class="cmd-copy-code">${esc(c.cmd)}</pre>
    <button class="copy-btn" onclick="copyCmd(this, ${JSON.stringify(c.cmd)})">COPY</button>
  </div>`;

  const labelHtml = sectionLabel ? `<span class="cmd-section-label">· ${esc(sectionLabel)}</span>` : '';

  return `<div class="cmd-card${isExpanded ? ' expanded' : ''}" data-ci="${ci}" data-si="${si}" data-secid="${secId || ''}">
    <div class="cmd-top">
      <span class="tag-pill" style="color:${tc};border-color:${tc}44;background:${tc}14">${esc(c.tag)}</span>
      <div class="cmd-main">
        <div class="cmd-text" style="color:${color}">${esc(c.cmd)}</div>
        <div class="cmd-desc">${esc(c.desc)}${labelHtml}</div>
      </div>
      <span class="cmd-chevron">▶</span>
    </div>
    <div class="cmd-detail">${detail}</div>
  </div>`;
}

// ── ATTACH LISTENERS ──────────────────────────────────────────
function attachSubListeners(sec) {
  document.querySelectorAll('.subsection').forEach(el => {
    const si = parseInt(el.dataset.si);
    const key = `${sec.id}-${si}`;
    el.querySelector('.sub-header').onclick = () => {
      expandedSubs[key] = !expandedSubs[key];
      el.classList.toggle('open');
      const title = el.querySelector('.sub-title');
      title.style.color = expandedSubs[key] ? sec.color : '#777';
      expandedCmds = {};
    };
  });

  document.querySelectorAll('.cmd-card').forEach(el => {
    el.querySelector('.cmd-top').onclick = () => {
      const si = el.dataset.si;
      const ci = el.dataset.ci;
      const secId = el.dataset.secid || activeId;
      const cmdKey = `${secId}-${si}-${ci}`;
      expandedCmds[cmdKey] = !expandedCmds[cmdKey];
      el.classList.toggle('expanded');
    };
  });
}

// ── SEARCH ────────────────────────────────────────────────────
function doSearch(q) {
  const el = document.getElementById('content');
  const clearBtn = document.getElementById('search-clear');

  if (!q.trim()) {
    clearBtn.style.display = 'none';
    renderSection();
    return;
  }

  clearBtn.style.display = 'block';
  const ql = q.toLowerCase();

  // Collect all matching commands across all sections
  const results = [];
  sections.forEach(sec => {
    if (sec.type !== 'notes') return;
    sec.subsections.forEach((sub, si) => {
      (sub.commands || []).forEach((c, ci) => {
        if (
          c.cmd.toLowerCase().includes(ql) ||
          c.desc.toLowerCase().includes(ql) ||
          (c.tag || '').toLowerCase().includes(ql)
        ) {
          results.push({ c, ci, si, sec, sub });
        }
      });
    });
  });

  let html = `<div id="search-header">${results.length} result${results.length !== 1 ? 's' : ''} for <span>"${esc(q)}"</span></div>`;

  if (results.length === 0) {
    html += `<div style="color:#333;font-size:12px;padding:20px 0;">no commands match that query</div>`;
  }

  // Group by section
  const bySection = {};
  results.forEach(r => {
    if (!bySection[r.sec.id]) bySection[r.sec.id] = { sec: r.sec, items: [] };
    bySection[r.sec.id].items.push(r);
  });

  Object.values(bySection).forEach(group => {
    html += `<div class="search-section-title" style="color:${group.sec.color}">
      ${group.sec.icon} ${esc(group.sec.title)}
    </div>`;
    group.items.forEach(({ c, ci, si, sec, sub }) => {
      html += renderCmdCard(c, ci, si, sec.color, sec.id, sec.title + ' — ' + sub.title);
    });
  });

  el.innerHTML = html;

  // Attach cmd listeners for search results
  document.querySelectorAll('.cmd-card').forEach(el => {
    el.querySelector('.cmd-top').onclick = () => {
      el.classList.toggle('expanded');
    };
  });
}

// ── COPY ──────────────────────────────────────────────────────
function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 1800);
  });
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderSection();
}

// ── ESCAPE HTML ───────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── INIT ──────────────────────────────────────────────────────
buildNav();
renderSection();

document.getElementById('search').addEventListener('input', e => {
  doSearch(e.target.value);
});
</script>
